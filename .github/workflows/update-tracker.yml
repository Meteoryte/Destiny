name: Update tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: watcher/requirements.txt

      - name: Cache PaddleOCR models
        uses: actions/cache@v4
        with:
          path: ~/.paddleocr
          key: paddleocr-models-en-v2

      - name: Install Python dependencies
        working-directory: watcher
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Warm up PaddleOCR models
        run: |
          python -c "from paddleocr import PaddleOCR; PaddleOCR(use_angle_cls=False, lang='en', show_log=False); print('paddleocr ready')"

      - name: Install watcher dependencies
        working-directory: watcher
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run watcher once
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          PYTHON_BIN: python
        run: node watcher/watch.js --once

      - name: Commit tracker changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.json latest-crop.png latest-frame.png || true
          git diff --cached --quiet && exit 0
          git commit -m "Update tracker data"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected, rebasing and retrying"
            git pull --rebase origin main || { echo "rebase failed"; exit 1; }
            sleep 3
          done
          echo "push failed after 5 attempts"
          exit 1
